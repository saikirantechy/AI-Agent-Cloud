name: Welcome contributors

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Add welcome note
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue || context.payload.pull_request;
            const isPullRequest = Boolean(context.payload.pull_request);
            const author = issue.user.login;
            const message = isPullRequest
              ? `Welcome @${author}! Thank you for contributing to AI-Agent-Cloud. A maintainer will review your pull request soon. If you need help, please ask in the discussion board or open a new issue.`
              : `Welcome @${author}! Thanks for opening an issue for AI-Agent-Cloud. Our maintainers will triage this quickly and let you know the next steps.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: message,
            });
