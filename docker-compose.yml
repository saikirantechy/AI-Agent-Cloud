version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-agent-cloud-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./docker
      dockerfile: backend.Dockerfile
    container_name: ai-agent-cloud-backend
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app/backend:ro
      - ./nexus-agents:/app/nexus-agents:ro

  frontend:
    build:
      context: ./docker
      dockerfile: frontend.Dockerfile
    container_name: ai-agent-cloud-frontend
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend:ro
    depends_on:
      - backend

volumes:
  postgres-data:
